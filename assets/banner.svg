<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="0.5" stop-color="#0D1728"/>
      <stop offset="1" stop-color="#0A111E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1200 260) scale(320)">
      <stop stop-color="#1E3A8A" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1E3A8A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="100" y1="150" x2="820" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#93C5FD"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="520" rx="28" fill="#080E19"/>
  <rect x="20" y="20" width="1560" height="480" rx="24" fill="url(#bg)" stroke="#1E293B" stroke-width="1.5"/>
  <circle cx="1200" cy="260" r="320" fill="url(#glow)"/>

  <!-- Left: identity -->
  <text x="100" y="196" fill="url(#title)" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="66" font-weight="800" letter-spacing="-2">Recommendation Engine</text>
  <text x="102" y="246" fill="#AEBED0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="27" font-weight="500">Modular recommender, built from first principles.</text>
  <text x="102" y="298" fill="#6B8199" font-family="Consolas, Menlo, monospace" font-size="20" font-weight="500" letter-spacing="0.5">Events &#8594; Statistics &#8594; Graph &#8594; Collaborative &#8594; Hybrid</text>

  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="600">
    <rect x="102" y="344" width="176" height="46" rx="23" fill="#0E1A2E" stroke="#3B82F6" stroke-opacity="0.4"/>
    <text x="190" y="373" fill="#93C5FD" text-anchor="middle">Phase 1 &#183; 2</text>
    <rect x="292" y="344" width="150" height="46" rx="23" fill="#0E1A2E" stroke="#22D3EE" stroke-opacity="0.4"/>
    <text x="367" y="373" fill="#7DD3FC" text-anchor="middle">Bun + TS</text>
    <rect x="456" y="344" width="196" height="46" rx="23" fill="#0E1A2E" stroke="#34D399" stroke-opacity="0.4"/>
    <text x="554" y="373" fill="#6EE7B7" text-anchor="middle">Explainable</text>
  </g>

  <!-- Right: the co-purchase graph the engine actually builds -->
  <g stroke-linecap="round">
    <!-- edges (thickness ~ co-purchase weight); bread -> milk is the reinforced recommendation -->
    <line x1="1200" y1="260" x2="1040" y2="128" stroke="#38BDF8" stroke-width="9" opacity="0.9"/>
    <line x1="1200" y1="260" x2="1424" y2="150" stroke="#64748B" stroke-width="5" opacity="0.7"/>
    <line x1="1200" y1="260" x2="1444" y2="372" stroke="#64748B" stroke-width="4" opacity="0.6"/>
    <line x1="1200" y1="260" x2="1084" y2="404" stroke="#64748B" stroke-width="3.5" opacity="0.55"/>
  </g>

  <!-- edge weight labels -->
  <g font-family="Consolas, Menlo, monospace" font-size="18" font-weight="600">
    <text x="1104" y="188" fill="#7DD3FC" text-anchor="middle">845</text>
    <text x="1322" y="196" fill="#94A3B8" text-anchor="middle">302</text>
    <text x="1338" y="322" fill="#94A3B8" text-anchor="middle">217</text>
    <text x="1128" y="344" fill="#94A3B8" text-anchor="middle">190</text>
  </g>

  <!-- nodes -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="600">
    <!-- satellites -->
    <circle cx="1040" cy="128" r="36" fill="#0B1A2B" stroke="#38BDF8" stroke-width="2.5"/>
    <text x="1040" y="134" fill="#E0F2FE" font-size="19" text-anchor="middle">milk</text>

    <circle cx="1424" cy="150" r="34" fill="#101826" stroke="#475569" stroke-width="2"/>
    <text x="1424" y="156" fill="#CBD5E1" font-size="18" text-anchor="middle">butter</text>

    <circle cx="1444" cy="372" r="34" fill="#101826" stroke="#475569" stroke-width="2"/>
    <text x="1444" y="378" fill="#CBD5E1" font-size="18" text-anchor="middle">cheese</text>

    <circle cx="1084" cy="404" r="32" fill="#101826" stroke="#475569" stroke-width="2"/>
    <text x="1084" y="410" fill="#CBD5E1" font-size="18" text-anchor="middle">ham</text>

    <!-- center / source product -->
    <circle cx="1200" cy="260" r="52" fill="#0A2540" stroke="#60A5FA" stroke-width="3"/>
    <circle cx="1200" cy="260" r="63" fill="none" stroke="#60A5FA" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="1200" y="267" fill="#F8FAFC" font-size="23" font-weight="700" text-anchor="middle">bread</text>
  </g>

  <!-- recommendation badge on the reinforced edge -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif">
    <rect x="1058" y="214" width="150" height="34" rx="17" fill="#0E1A2E" stroke="#38BDF8" stroke-opacity="0.5"/>
    <circle cx="1080" cy="231" r="5" fill="#38BDF8"/>
    <text x="1096" y="237" fill="#7DD3FC" font-size="16" font-weight="600">recommended</text>
  </g>
</svg>

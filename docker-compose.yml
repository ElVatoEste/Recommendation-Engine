services:
  postgres:
    image: postgres:16-alpine
    container_name: recommendation_engine_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-recommendation_engine}
    ports:
      # Bind to IPv4 explicitly; Docker Desktop otherwise publishes IPv6-only on Windows.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # SQL files here run once, in filename order, on first initialization.
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-recommendation_engine}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: recommendation_engine_api
    restart: unless-stopped
    profiles: ["api"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-recommendation_engine}
    ports:
      - "${PORT:-3000}:3000"

volumes:
  pgdata:
